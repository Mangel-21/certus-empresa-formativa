<div class="login-wrapper">
  <p-card class="login-card">
    <ng-template pTemplate="header">
      <div class="header-container">
        <h2>Red Social CERTUS TI</h2>
        <p class="subtitle">Conecta con alumnos y egresados</p>
      </div>
    </ng-template>

    <div class="login-content">
      <p>Inicia sesión con tu correo institucional para continuar.</p>
      
      <div class="google-btn-container">
        <!-- El botón de Google Sign-in oficial renderizado por la librería -->
        <asl-google-signin-button type="standard" size="large" theme="filled_blue"></asl-google-signin-button>
      </div>
    </div>
  </p-card>
</div>
